# JS/TS workspace members. The Python app (apps/api) is managed by uv, not pnpm.
packages:
  - apps/web
  - packages/shared

# Build scripts pnpm should not run automatically (require explicit approval).
ignoredBuiltDependencies:
  - sharp
  - unrs-resolver

# Build scripts pnpm is allowed to run (lefthook fetches its binary on install).
onlyBuiltDependencies:
  - lefthook
