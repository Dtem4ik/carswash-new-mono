name: CI

on:
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same PR when new commits are pushed.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: web (lint · typecheck · build · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain (node, pnpm) from mise
        uses: jdx/mise-action@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome (lint + format check)
        run: pnpm exec biome ci .

      - name: Type-check (web + shared)
        run: pnpm run typecheck

      - name: Build web
        run: pnpm run build:web

      - name: Test web (vitest)
        run: pnpm run test:web

  api:
    name: api (lint · typecheck · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain (python, uv) from mise
        uses: jdx/mise-action@v2

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: mypy (strict)
        run: uv run mypy

      - name: pytest
        run: uv run pytest
